<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGAVA — Astra General Affair Virtual Assistant</title>
<style>
:root{
  --navy:#0a2540; --navy2:#0e3a5f; --navy3:#103a63; --blue:#1769ff; --teal:#16c2c2;
  --gold:#f4b400; --bg:#eef2f8; --card:#ffffff; --line:#e3e8f0;
  --txt:#1a2433; --muted:#6b7a90; --green:#1aa971; --amber:#e8a300; --red:#e5484d;
  --shadow:0 1px 3px rgba(16,42,73,.08),0 6px 20px rgba(16,42,73,.06);
  --sidebar-w:236px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh}

/* ===== Sidebar ===== */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:linear-gradient(180deg,var(--navy),#071a30);
  color:#dbe6f5;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  box-shadow:2px 0 18px rgba(7,26,48,.18);z-index:30}
.side-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.side-logo .logo-card{background:#fff;border-radius:12px;padding:12px 14px;display:flex;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.18)}
.side-logo img{width:100%;max-width:160px;height:auto;display:block}
.side-logo .tag{font-size:10.5px;color:#7e93b3;text-align:center;margin-top:9px;letter-spacing:.4px}
.nav{flex:1;padding:6px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;cursor:pointer;
  color:#aebed6;font-size:13.5px;font-weight:600;margin:3px 0;position:relative;transition:.16s;border:none;background:none;width:100%;text-align:left}
.nav-item img{width:19px;height:19px;opacity:.82;flex-shrink:0;transition:.16s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item:hover img{opacity:1}
.nav-item.active{background:linear-gradient(90deg,rgba(23,105,255,.30),rgba(22,194,194,.12));color:#fff}
.nav-item.active img{opacity:1}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:4px;border-radius:0 4px 4px 0;
  background:linear-gradient(180deg,var(--teal),var(--blue))}
.nav-badge{margin-left:auto;font-size:10.5px;background:var(--blue);color:#fff;border-radius:20px;padding:1px 8px;font-weight:700}
.soon{margin-left:auto;font-size:9.5px;color:#7e93b3;border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:1px 7px;font-weight:600}
.side-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#6c80a0;line-height:1.6}

/* ===== Main ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:20;box-shadow:0 1px 2px rgba(16,42,73,.04)}
.burger{display:none;background:none;border:1px solid var(--line);border-radius:9px;font-size:18px;padding:5px 11px;cursor:pointer;color:var(--navy)}
.page-title h1{font-size:19px;font-weight:800;color:var(--navy);letter-spacing:.2px}
.page-title p{font-size:12.5px;color:var(--muted);margin-top:1px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:18px}
.clock{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.live{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#0d8a5a;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;background:#26d97f;box-shadow:0 0 0 0 rgba(38,217,127,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(38,217,127,.5)}70%{box-shadow:0 0 0 8px rgba(38,217,127,0)}100%{box-shadow:0 0 0 0 rgba(38,217,127,0)}}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:13px;box-shadow:0 3px 10px rgba(23,105,255,.35)}
.content{padding:24px 26px 44px;flex:1}

/* ===== Views ===== */
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== KPI ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;position:relative;box-shadow:var(--shadow);overflow:hidden}
.kpi-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.kpi-work::before{background:var(--amber)} .kpi-done::before{background:var(--green)} .kpi-alert::before{background:var(--red)}
.kpi-val{font-size:34px;font-weight:800;line-height:1;color:var(--navy)}
.kpi-alert .kpi-val{color:var(--red)}
.kpi-label{font-size:13px;font-weight:600;margin-top:7px}
.kpi-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpi-icon{position:absolute;right:14px;top:14px;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:17px}
.ic-inbox{background:#e7f0ff} .ic-work{background:#fff3da} .ic-done{background:#e3f7ee} .ic-alert{background:#fde7e8}

/* ===== Panels & layout ===== */
.cols{display:grid;grid-template-columns:1.55fr 1fr;gap:20px;align-items:start}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:20px}
.panel-hd{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.panel-hd h2{font-size:15px;font-weight:700}
.panel-hd .sub{font-size:12px;color:var(--muted);margin-left:auto}
select{font-family:inherit;font-size:12.5px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--txt);cursor:pointer}
.btn{font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:none;border-radius:8px;background:var(--blue);color:#fff;cursor:pointer;transition:.15s}
.btn:hover{background:#0f56d6}
.btn.ghost{background:#eef2fb;color:var(--navy);border:1px solid var(--line)}
.btn.ghost:hover{background:#e3eafa}

/* ===== Tickets ===== */
.toolbar{display:flex;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);align-items:center}
.toolbar label{font-size:12.5px;color:var(--muted)}
.ticket-list{padding:8px;max-height:540px;overflow-y:auto}
.ticket{border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin:8px;transition:.2s}
.ticket:hover{border-color:#c9d6ea;box-shadow:0 3px 12px rgba(16,42,73,.06)}
.ticket.flash{animation:flash 1.6s ease-out}
@keyframes flash{0%{background:#e7f0ff;border-color:var(--blue)}100%{background:#fff}}
.t-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.t-id{font-weight:700;font-size:13px;color:var(--navy)}
.t-text{font-size:13.5px;line-height:1.45;margin-bottom:9px}
.t-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.chip{font-size:11px;background:#eaf1ff;color:#1453c2;padding:3px 9px;border-radius:20px;font-weight:600}
.chip.ghost{background:#f0f2f7;color:var(--muted);font-weight:500}
.t-foot{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px}
.t-foot b{color:var(--txt)}
.t-ago{margin-left:auto}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.st-assigned{background:#eef2fb;color:#3a5a9c}
.st-progress{background:#fff3da;color:#9a6b00}
.st-done{background:#e3f7ee;color:#0d7a4f}
.st-breach{background:#fde7e8;color:#c0282d}
.sla-wrap{margin-top:9px}
.sla-bar{height:6px;background:#eef1f6;border-radius:6px;overflow:hidden}
.sla-fill{height:100%;border-radius:6px;transition:width .5s}
.sla-txt{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
.empty{text-align:center;color:var(--muted);padding:40px;font-size:13px}

/* ===== Chart ===== */
.chart-box{padding:16px 18px}
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar-label{width:120px;font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:11px;background:#eef1f6;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:6px;transition:width .6s}
.bar-val{width:24px;text-align:right;font-size:12.5px;font-weight:700;color:var(--navy)}

/* ===== Chat ===== */
.chat{display:flex;flex-direction:column;height:540px}
.chatlog{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:90%;padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.5}
.msg.agava{background:#f0f5ff;border:1px solid #dde8ff;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:linear-gradient(135deg,var(--blue),#0f56d6);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg .mini{font-size:11px;opacity:.75}
.typing{align-self:flex-start;background:#f0f5ff;border:1px solid #dde8ff;border-radius:13px;border-bottom-left-radius:4px;padding:12px 14px;display:flex;gap:4px}
.typing span{width:7px;height:7px;border-radius:50%;background:#9bb4dc;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.examples{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
.example{font-size:11.5px;background:#fff;border:1px solid var(--line);color:var(--navy);padding:6px 10px;border-radius:18px;cursor:pointer;transition:.15s}
.example:hover{background:#eef2fb;border-color:var(--blue)}
.chatbar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
.chatbar input{flex:1;font-family:inherit;font-size:13px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;outline:none}
.chatbar input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(23,105,255,.12)}

/* ===== Generic module cards ===== */
.mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.mcard h3{font-size:14.5px;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:9px}
.mcard .num{font-size:30px;font-weight:800;color:var(--navy);margin:6px 0 2px}
.mcard p{font-size:12.5px;color:var(--muted);line-height:1.5}
.mhero{display:flex;align-items:center;gap:16px;background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;border-radius:14px;padding:22px 24px;margin-bottom:22px;box-shadow:var(--shadow)}
.mhero .mh-ic{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.12);display:grid;place-items:center}
.mhero .mh-ic img{width:28px;height:28px}
.mhero h2{font-size:20px;font-weight:800}
.mhero p{font-size:13px;color:#bcd0ee;margin-top:3px;max-width:640px;line-height:1.5}
.mhero .pill{margin-left:auto;font-size:11.5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:6px 13px;border-radius:20px;white-space:nowrap}
.list-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);font-size:13px}
.list-row:last-child{border-bottom:none}
.list-row .lr-main{flex:1}
.list-row .lr-main b{color:var(--txt)}
.list-row .lr-sub{font-size:11.5px;color:var(--muted)}
.pgbar{height:8px;background:#eef1f6;border-radius:6px;overflow:hidden;width:120px}
.pgbar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--blue))}

/* ===== Toasts ===== */
.toasts{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:60}
.toast{background:var(--navy);color:#fff;padding:12px 16px;border-radius:11px;font-size:12.5px;max-width:330px;
  box-shadow:0 8px 28px rgba(7,26,48,.35);border-left:4px solid var(--teal);animation:slideIn .3s ease}
.toast b{color:#aef0e6}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

@media(max-width:1080px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.cols,.grid-2{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:760px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:.25s}
  .sidebar.open{transform:none}
  .burger{display:block}
  .grid-3{grid-template-columns:1fr}
  .scrim{display:none;position:fixed;inset:0;background:rgba(7,26,48,.45);z-index:25}
  .scrim.show{display:block}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="side-logo">
      <div class="logo-card"><img src="assets/logo.png" alt="AGAVA"></div>
      <div class="tag">GA Service Hub · Astra</div>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="dashboard"><img src="assets/icons/01_Dashboard.png">Dashboard</button>
      <button class="nav-item" data-view="service"><img src="assets/icons/04_Service.png">Service Desk<span class="nav-badge" id="navServiceBadge">0</span></button>
      <button class="nav-item" data-view="building"><img src="assets/icons/02_Building.png">Building<span class="soon">soon</span></button>
      <button class="nav-item" data-view="project"><img src="assets/icons/03_Project.png">Project<span class="soon">soon</span></button>
      <button class="nav-item" data-view="procurement"><img src="assets/icons/05_Procurement.png">Procurement<span class="soon">soon</span></button>
      <button class="nav-item" data-view="payment"><img src="assets/icons/06_Payment.png">Payment<span class="soon">soon</span></button>
      <button class="nav-item" data-view="energy"><img src="assets/icons/07_Energy.png">Energy<span class="soon">soon</span></button>
      <button class="nav-item" data-view="hse"><img src="assets/icons/08_HSE.png">HSE<span class="soon">soon</span></button>
      <button class="nav-item" data-view="reminder"><img src="assets/icons/09_Reminder.png">Reminder<span class="soon">soon</span></button>
    </nav>
    <div class="side-foot">AGAVA Web · prototype<br>Engine: simulasi Copilot intent</div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="main">
    <header class="topbar">
      <button class="burger" id="burger">☰</button>
      <div class="page-title">
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSub">Ringkasan operasional General Affair hari ini</p>
      </div>
      <div class="top-right">
        <span class="clock" id="clock">—</span>
        <span class="live"><span class="dot"></span> AGAVA online</span>
        <div class="avatar" title="Sudana Visudha">SV</div>
      </div>
    </header>

    <div class="content">
      <section class="view active" id="view-dashboard"></section>
      <section class="view" id="view-service"></section>
      <section class="view" id="view-building"></section>
      <section class="view" id="view-project"></section>
      <section class="view" id="view-procurement"></section>
      <section class="view" id="view-payment"></section>
      <section class="view" id="view-energy"></section>
      <section class="view" id="view-hse"></section>
      <section class="view" id="view-reminder"></section>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
