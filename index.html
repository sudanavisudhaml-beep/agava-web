<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGAVA · Astra General Affairs Virtual Assistant</title>
<style>
:root{
  --navy:#0b2546; --navy2:#08203c; --ink:#0f2036; --text:#23344a; --muted:#6b7a90;
  --line:#e9edf3; --bg:#f5f7fb; --card:#fff;
  --blue:#2563eb; --blue-s:#eef4ff; --red:#dc2626; --red-s:#fdecec;
  --amber:#c2740a; --amber-s:#fdf3e3; --green:#15a34a; --green-s:#e9f8ef;
  --logo-red:#e11d48;
  --r:14px; --ff:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","SF Pro Icons","Helvetica Neue","Segoe UI",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cfd8e3;border-radius:10px}

/* ---------- Sidebar ---------- */
.side{width:240px;flex:0 0 240px;background:linear-gradient(180deg,var(--navy),var(--navy2));
  color:#cdd9ea;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:0}
.logo-wrap{padding:26px 22px 16px}
.logo-plate{background:transparent;padding:0;box-shadow:none}
.logo-img{width:100%;height:auto;display:block;filter:brightness(0) invert(1)}
.sec-label{font-size:10.5px;letter-spacing:1.8px;color:#64779a;padding:8px 26px 8px;font-weight:700}
.nav{flex:1;padding:2px 14px;display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:10px;color:#b6c6dc;
  text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.nav a svg{width:18px;height:18px;flex:0 0 18px;stroke:currentColor;fill:none;stroke-width:1.9}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:rgba(255,255,255,.10);color:#fff;border-left-color:var(--blue)}
.nav a.active svg{stroke:#6aa3ff}
.side-user{display:flex;align-items:center;gap:11px;padding:16px 22px;border-top:1px solid rgba(255,255,255,.08)}
.side-user .av{width:34px;height:34px;border-radius:50%;background:#1d3a63;display:grid;place-items:center;
  color:#cfe0f7;font-weight:700;font-size:13px}
.side-user b{color:#fff;font-size:13px;font-weight:600;display:block}
.side-user span{font-size:11px;color:#7c8ca6}

/* ---------- Main ---------- */
.main{flex:1;min-width:0}
.top{display:flex;align-items:flex-start;gap:16px;padding:26px 34px 8px}
.top h1{font-size:24px;color:var(--ink);font-weight:800;letter-spacing:-.3px}
.top .sub{font-size:13px;color:var(--muted);margin-top:5px}
.top .acts{margin-left:auto;display:flex;gap:10px}
.icon-btn{width:40px;height:40px;border-radius:11px;background:#fff;border:1px solid var(--line);
  display:grid;place-items:center;cursor:pointer;color:var(--muted);box-shadow:0 1px 2px rgba(16,32,54,.04)}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9}
.icon-btn:hover{color:var(--blue);border-color:#cdddf7}
.wrap{padding:14px 34px 50px}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 1px 3px rgba(16,32,54,.04)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
.kpi{padding:16px 18px}
.kpi .l{font-size:12.5px;color:var(--muted)}
.kpi .v{font-size:30px;font-weight:800;margin-top:6px;color:var(--ink);line-height:1}
.kpi.red .v{color:var(--red)} .kpi.amber .v{color:var(--amber)} .kpi.green .v{color:var(--green)}

.sec{margin-bottom:18px;overflow:hidden}
.sec-h{display:flex;align-items:center;gap:13px;padding:18px 20px}
.sec-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 38px}
.sec-ic svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9}
.sec-h h2{font-size:16px;color:var(--ink);font-weight:700}
.sec-h .d{font-size:12.5px;color:var(--muted);margin-top:2px}
.sec-body{padding:0 20px 20px}

/* agenda list */
.row-item{display:flex;align-items:center;gap:16px;padding:11px 0;border-top:1px solid var(--line)}
.row-item .date{flex:0 0 52px;font-size:12px;font-weight:700;color:var(--blue);text-align:left}
.row-item .ti b{font-size:13.5px;color:var(--ink);font-weight:600}
.row-item .ti span{display:block;font-size:12px;color:var(--muted);margin-top:1px}
.row-item .st{margin-left:auto}
.tag{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap}
.tag.run{background:var(--green-s);color:var(--green)} .tag.up{background:var(--blue-s);color:var(--blue)}
.tag.soon{background:var(--amber-s);color:var(--amber)}

/* project cards */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pcard{border:1px solid var(--line);border-radius:11px;padding:14px}
.pcard .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.pcard .ph b{font-size:13.5px;color:var(--ink)}
.bar{height:7px;background:#eef1f6;border-radius:6px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px}
.pcard .pf{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:8px}

/* mini stat boxes */
.boxes{display:grid;gap:12px}
.box{border:1px solid var(--line);border-radius:11px;padding:14px 12px;text-align:center}
.box .v{font-size:24px;font-weight:800;color:var(--ink);line-height:1}
.box .l{font-size:11.5px;color:var(--muted);margin-top:6px}
.box.blue .v{color:var(--blue)} .box.amber .v{color:var(--amber)} .box.green .v{color:var(--green)}
.box.red .v{color:var(--red)}

/* Today Activity / Upcoming */
.mini-panel{border:1px solid var(--line);border-radius:11px;padding:14px 15px;background:#fdfefe}
.mp-h{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.stat-line{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-top:1px solid var(--line)}
.stat-line:first-of-type{border-top:none}
.stat-line .lab{font-size:12.5px;color:var(--muted)}
.stat-line .n{font-size:17px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.stat-line .n.blue{color:var(--blue)}.stat-line .n.green{color:var(--green)}.stat-line .n.amber{color:var(--amber)}
.up-count{font-size:26px;font-weight:800;color:var(--ink);line-height:1;margin-bottom:8px}
.up-count small{font-size:12px;color:var(--muted);font-weight:600;margin-left:4px}
.up-item{display:flex;gap:11px;padding:7px 0;border-top:1px solid var(--line)}
.up-item:first-of-type{border-top:none}
.up-item .ud{flex:0 0 46px;font-size:11px;font-weight:700;color:var(--blue)}
.up-item .un{font-size:12.5px;color:var(--ink);line-height:1.35}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1040px){.grid4{grid-template-columns:repeat(2,1fr)}}
.today-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:16px}
@media(max-width:1040px){.today-grid{grid-template-columns:1fr 1fr}}
.evt{padding:9px 0;border-top:1px solid var(--line)}
.evt:first-of-type{border-top:none;padding-top:0}
.evt-top{display:flex;align-items:center;gap:8px}
.evt-top b{font-size:13px;color:var(--ink)}
.evt-v{font-size:11.5px;color:var(--blue);font-weight:600;margin-top:2px}
.evt-d{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.see-more{display:inline-block;margin-top:10px;font-size:12px;color:var(--blue);font-weight:600;cursor:pointer}
.see-more:hover{text-decoration:underline}
.pad{padding:20px}
.hl-headrow{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:12px}
.hl-tag{font-size:15px;font-weight:800;letter-spacing:2px;color:var(--ink);padding-bottom:9px;border-bottom:3px solid var(--blue);display:flex;align-items:center;gap:9px}
.hl-tag.up{border-bottom-color:#7a4fd0}
.hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;margin-bottom:18px}
.hl-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.t2grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ucol{display:grid;grid-template-columns:1fr;gap:14px}
@media(max-width:1040px){.hl-headrow,.hl-grid,.t2grid{grid-template-columns:1fr}}
.evroom{padding:11px 0;border-top:1px solid var(--line)}
.evroom:first-of-type{border-top:none;padding-top:2px}
.evroom-note{font-size:11px;color:#9aa7b8;margin:-4px 0 10px;font-style:italic}
.evroom-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.evroom-room{font-size:13.5px;font-weight:700;color:var(--ink)}
.evroom-time{font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-s);padding:3px 9px;border-radius:8px;white-space:nowrap}
.evroom-ev{font-size:12px;color:var(--muted);margin-top:3px}
.evroom-meta{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text)}
.evroom-meta span{display:inline-flex;align-items:center;gap:4px}
.evroom-meta .hot{color:var(--amber);font-weight:700}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.panel-t{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:13px}
.sbar{margin-bottom:12px}
.sbar .sl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.sbar .sl b{color:var(--ink)}

.muted{color:var(--muted)} .hide{display:none!important}

/* Energy / ERSUS */
.mtx{width:100%;border-collapse:collapse;font-size:12px}
.mtx th{font-size:10px;color:var(--muted);font-weight:700;padding:5px 3px;text-align:center}
.mtx td.lab{text-align:left;color:var(--ink);font-weight:600;white-space:nowrap;padding:7px 12px 7px 2px;font-size:12.5px}
.mtx td.cell{padding:4px 3px;text-align:center}
.mtx .mk{display:inline-block;width:15px;height:15px;border-radius:5px;background:#e9edf3}
.mtx .mk.on{background:#bcd3f5}.mtx .mk.now{background:var(--amber)}.mtx .mk.done{background:var(--green)}
.chiller{border:1px solid var(--line);border-radius:11px;padding:14px}
.chiller .name{font-weight:700;color:var(--ink);font-size:13.5px}
.chiller .load{font-size:24px;font-weight:800;margin-top:8px;line-height:1}
.temp-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line)}
.temp-row:first-of-type{border-top:none}
.insight{display:flex;gap:13px;padding:14px 16px;border:1px solid var(--line);border-radius:11px;border-left:4px solid #cfd8e3;margin-bottom:12px;align-items:flex-start}
.insight.crit{border-left-color:var(--red);background:#fef8f8}
.insight.warn{border-left-color:var(--amber);background:#fffdf5}
.insight.info{border-left-color:var(--blue)}
.insight .ico{font-size:19px;line-height:1}
.btn-act{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--ff)}
.btn-act:hover{background:#1d4fd0}
.btn-out{background:#fff;color:var(--blue);border:1px solid #bcd3f5;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff)}
.btn-out:hover{background:var(--blue-s)}
.bd-info{background:var(--blue-s);color:var(--blue)}
.bd-proc{background:#ede9fe;color:#7a4fd0}
.bell-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;background:var(--red);color:#fff;border-radius:9px;font-size:10.5px;font-weight:700;display:grid;place-items:center;padding:0 4px;border:2px solid #fff}
.login-screen{position:fixed;inset:0;z-index:300;background:linear-gradient(135deg,#0b2546,#08203c);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:18px;padding:36px 34px;width:min(560px,100%);box-shadow:0 30px 80px rgba(0,0,0,.45)}
.login-img{width:200px;height:auto;display:block;margin:0 auto 4px}
.login-tag{text-align:center;font-size:12px;color:var(--muted);margin:10px 0 24px;letter-spacing:.3px}
.login-field input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px;font-family:var(--ff);outline:none}
.login-field input:focus{border-color:#bcd3f5}
.login-btn{width:100%;margin-top:12px;background:var(--blue);color:#fff;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--ff)}
.login-btn:hover{background:#1d4fd0}
.login-msg{font-size:12px;color:var(--red);min-height:16px;margin-top:8px;text-align:center}
.login-demo{font-size:11.5px;color:var(--muted);margin:10px 0 10px;text-align:center}
.login-accounts{display:flex;flex-direction:column;max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:12px}
.login-accounts button{text-align:left;border:none;border-bottom:1px solid var(--line);background:#fff;padding:8px 13px;cursor:pointer;font-family:var(--ff);color:var(--ink);display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:11px;transition:.12s}
.login-accounts button:last-child{border-bottom:none}
.login-accounts button:hover{background:var(--blue-s)}
.la-ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#16c2c2,#2563eb);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}
.la-main{display:flex;flex-direction:column;min-width:0}
.la-main b{font-weight:600;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.la-main small{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.la-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;white-space:nowrap}
.la-role{font-size:11.5px;color:var(--blue);font-weight:700}
.la-tier{font-size:10px;color:var(--muted)}
.live-chip{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 13px;border:1px solid var(--line);background:#fff;border-radius:30px;font-family:var(--ff);font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;box-shadow:0 1px 2px rgba(16,32,54,.05);transition:.15s;white-space:nowrap}
.live-chip:hover{border-color:#cfdaeb;color:var(--text)}
.live-chip.on{border-color:#bfe6cd;background:var(--green-s);color:#15703a}
.live-chip.warn{border-color:#f0d9ad;background:var(--amber-s);color:#8a5300}
.live-chip.err{border-color:#f3c4c4;background:var(--red-s);color:#a82020}
.live-dot{width:8px;height:8px;border-radius:50%;background:#9aa7b8;flex:0 0 8px}
.live-chip.on .live-dot{background:var(--green);animation:livePulse 1.6s infinite}
.live-chip.warn .live-dot{background:var(--amber)}
.live-chip.err .live-dot{background:var(--red)}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(21,163,74,.5)}50%{box-shadow:0 0 0 5px rgba(21,163,74,0)}}
.sla-tbl{width:100%;border-collapse:collapse;font-size:13px}
.sla-tbl th{background:var(--navy);color:#fff;font-weight:600;padding:9px 12px;text-align:left;font-size:11.5px;letter-spacing:.02em}
.sla-tbl td{border-bottom:1px solid var(--line);padding:8px 12px;vertical-align:middle}
.sla-tbl tr.sla-cat td{background:var(--blue-s);font-weight:700;color:var(--ink);font-size:12.5px}
.sla-tbl .sla-no{color:var(--muted);font-weight:700;text-align:center}
.sla-tbl .sla-k{color:var(--text);max-width:300px}
.sla-tbl .sla-sel select{width:100%}
.sla-tbl .sla-pt{text-align:center;font-weight:800;color:var(--blue);font-size:16px}
.sla-formula{background:#f8fafd;border:1px solid var(--line);border-radius:8px;padding:10px 13px;font-size:12.5px;color:var(--muted);margin:8px 0 14px;line-height:1.7}
.sla-formula b{color:var(--ink)}
.sla-total-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:14px;align-items:center;padding:8px 0}
.sla-total{font-size:30px;font-weight:800;color:var(--ink);line-height:1;margin-top:2px}
.inv-steps{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:8px 2px 4px}
.inv-step{display:flex;flex-direction:column;align-items:center;text-align:center;min-width:104px;flex:0 0 auto}
.inv-dot{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;background:#eef1f6;color:#9aa7b8;border:2px solid var(--line)}
.inv-step.done .inv-dot{background:var(--green);color:#fff;border-color:var(--green)}
.inv-step.cur .inv-dot{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.16)}
.inv-step.late .inv-dot{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 0 4px rgba(220,38,38,.14)}
.inv-step.late .inv-lbl{color:var(--red);font-weight:700}
.inv-ts.late{color:var(--red);font-weight:700}
.inv-lbl{font-size:11px;font-weight:600;color:var(--text);margin-top:5px;max-width:104px;line-height:1.25}
.inv-step.wait .inv-lbl{color:var(--muted)}
.inv-ts{font-size:10px;color:var(--muted);margin-top:2px}
.inv-bar{flex:1;height:2px;background:var(--line);margin-top:13px;min-width:16px}
.inv-opt{display:block;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:12.5px;cursor:pointer}
.inv-opt:hover{border-color:#cfdaeb}
.inv-opt input{margin-right:6px}
.rb-plan-wrap{width:100%;overflow-x:auto;margin-top:12px}
.rb-plan{width:100%;height:auto;min-width:700px;display:block}
.rb-outline{fill:#fff;stroke:#d7dee8;stroke-width:2}
.rb-floorlbl{font-size:13px;font-weight:700;fill:#aeb8c6;font-family:var(--ff)}
.rb-empty{fill:var(--muted);font-size:15px;font-family:var(--ff)}
.rb-room rect{stroke-width:1.6;cursor:pointer;transition:fill .12s,stroke .12s}
.rb-room.free rect{fill:#d7f5e1;stroke:#15a34a}
.rb-room.busy rect{fill:#fcdada;stroke:#dc2626}
.rb-room:hover rect{stroke-width:3;filter:brightness(.96)}
.rb-room text{pointer-events:none}
.rb-rname{font-size:13px;font-weight:700;fill:#1f3329;font-family:var(--ff)}
.rb-room.busy .rb-rname{fill:#7a1f1f}
.rb-rcap{font-size:11px;fill:#4a6b57;font-family:var(--ff)}
.rb-room.busy .rb-rcap{fill:#9a4040}
.rb-legend{display:flex;gap:16px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap}
.rb-legend i{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:5px}
.rb-sw.free{background:#d7f5e1;border:1px solid #15a34a}
.rb-sw.busy{background:#fcdada;border:1px solid #dc2626}
.rb-plan-img{position:relative;width:100%;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;margin-top:12px}
.rb-plan-img img{width:100%;display:block;user-select:none}
.rb-hotspot{position:absolute;border:2px solid;border-radius:5px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:.1s}
.rb-hotspot.free{background:rgba(21,163,74,.30);border-color:#15a34a}
.rb-hotspot.busy{background:rgba(220,38,38,.34);border-color:#dc2626}
.rb-hotspot:hover{box-shadow:0 0 0 2px var(--blue) inset;z-index:3}
.rb-hot-name{font-size:10px;font-weight:700;color:#1c2b3a;background:rgba(255,255,255,.85);padding:1px 4px;border-radius:3px;line-height:1.15;text-align:center;max-width:96%;overflow:hidden;font-family:var(--ff)}
.rb-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.rb-chip{border:1.5px solid;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--ff)}
.rb-chip.free{background:#d7f5e1;border-color:#15a34a;color:#0f5132}
.rb-chip.busy{background:#fcdada;border-color:#dc2626;color:#7a1f1f}

.ts .tt{font-size:13.5px;font-weight:600;color:var(--ink)}
.ts.pending .tt{color:#9aa7b8;font-weight:500}
.ts .td{font-size:12px;color:var(--muted);margin-top:2px}
.gate-chip{font-size:10.5px;font-weight:700;color:#7a4fd0;background:#f1ecfc;padding:2px 8px;border-radius:10px;margin-left:8px}

@media(max-width:1040px){.kpis,.grid3{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}
  .funnel{flex-wrap:wrap}.fstep::after{display:none}.fstep{border-radius:11px!important;border-right:1px solid var(--line);flex:1 1 45%}}
/* overview extras */
.mini-note{font-size:11px;color:var(--muted);margin-top:8px;border-top:1px solid var(--line);padding-top:8px;line-height:1.5}
.rating-card{display:flex;align-items:center;gap:24px;padding:18px 24px;margin-bottom:18px}
.rc-left{text-align:center;padding-right:24px;border-right:1px solid var(--line)}
.rc-score{font-size:42px;font-weight:800;color:var(--ink);line-height:1}
.rc-stars{color:#f5a623;font-size:18px;letter-spacing:2px;margin-top:4px}
.rc-sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.rc-mid{flex:1;max-width:360px}
.rc-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px}
.rc-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:3px}
.rc-bar>span:first-child{width:10px;text-align:right}
.rc-track{flex:1;height:7px;background:#eef1f6;border-radius:5px;overflow:hidden}
.rc-track i{display:block;height:100%;background:#f5a623}
.rc-pct{width:34px;text-align:right}
.rc-badge{margin-left:auto;background:var(--green-s);color:var(--green);font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:20px;white-space:nowrap}
.work-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.work-row:first-of-type{border-top:none}
.work-row .tj{font-size:13px;color:var(--ink);font-weight:500}
.work-row .tm{font-size:11px;color:var(--muted);margin-top:1px}
.bu-alert-note,.vp-note{font-size:11px;color:#9aa7b8;font-style:italic;margin-bottom:10px}
.vtier{display:inline-block;margin-top:6px;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:12px}
.vt-silver{background:#eef1f6;color:#64748b}.vt-gold{background:#fdf3e3;color:#c2740a}.vt-plat{background:#ede9fe;color:#7a4fd0}
/* SharePoint-style vendor cards */
.sp-card{background:#fff;border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(16,32,54,.07)}
.sp-head{min-height:54px;display:flex;align-items:center;gap:11px;padding:10px 12px;position:relative}
.sp-htitle{color:#fff;font-size:12.5px;font-weight:700;line-height:1.25}
.sp-tile{width:40px;height:40px;flex:0 0 40px;border-radius:4px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12.5px;background:rgba(0,0,0,.22)}
.logo-mini svg{width:28px;height:28px}
.sp-star{position:absolute;right:12px;top:9px;color:#fff;opacity:.9;font-size:15px}
.sp-body{padding:12px 14px 14px}
.sp-title{font-size:14px;font-weight:700;color:var(--ink)}
.sp-sub{font-size:11.5px;color:var(--muted);margin-bottom:10px}
.sp-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:10px}
.sp-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line);font-size:12.5px}
.sp-row:first-of-type{border-top:none}
.sp-row .sp-ic{width:24px;height:24px;border-radius:50%;background:#eef1f6;display:grid;place-items:center;font-size:12px;flex:0 0 24px}
.sp-row .sp-rtext{flex:1;color:var(--muted)}
.sp-row b{color:var(--ink);font-size:13.5px}
/* ESG scorecard table */
.esg-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:800px}
.esg-tbl th{color:var(--muted);font-weight:700;padding:5px 4px;text-align:center;font-size:10px}
.esg-tbl th:first-child{text-align:left}
.esg-tbl td{padding:7px 4px;text-align:center;border:1px solid #fff}
.esg-tbl td.name{background:#fff;color:var(--ink);font-weight:700;text-align:left;white-space:nowrap}
.esg-tbl td.stat{background:#fff}
.esg-tbl td.wt{background:#1f5fb0;color:#fff;font-weight:700}
.esg-tbl tr.kpi td.val{background:#1f5fb0;color:#fff;font-weight:600}
.esg-tbl tr.esg-prog td{background:#16a34a;color:#fff;font-weight:700}
.esg-tbl tr.esg-prog td.name{background:#1f5fb0;color:#fff}
.esg-tbl tr.esg-target td{background:#fff;color:var(--ink);font-weight:600;border-color:#e9edf3}
.esg-tbl td.empty{background:#fff!important;border-color:#eef1f6!important}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%}
.dot.ok{background:#16a34a}.dot.warn{background:#f5a623}.dot.crit{background:#dc2626}
.so-no-sm{font-size:10.5px;font-weight:600;letter-spacing:.3px;color:#9aa7b8;margin-bottom:3px}
.so-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.so-itbl{width:100%;border-collapse:collapse}
.so-itbl th{text-align:left;font-size:10.5px;color:var(--muted);font-weight:700;padding:4px 6px;text-transform:uppercase;letter-spacing:.4px}
.so-itbl td{padding:3px 6px;border-top:1px solid var(--line)}
.so-itbl input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--ff);outline:none}
.so-itbl input:focus{border-color:#bcd3f5}
.so-rm{border:none;background:#f1f4f8;color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:12px}
.so-rm:hover{background:#fdecec;color:var(--red)}
input::placeholder,textarea::placeholder{color:#aeb8c6;opacity:1;font-style:italic;font-weight:400}
.field input,.field textarea,.so-itbl input,.cp-input input,.login-field input{color:var(--ink)}
@media(max-width:760px){.rating-card{flex-wrap:wrap}.rc-badge{margin-left:0}}
/* sidebar collapse + accordion */
.side{transition:width .22s ease,flex-basis .22s ease}
.rail-toggle{position:absolute;top:50%;transform:translateY(-50%);right:-14px;width:28px;height:28px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 2px 7px rgba(16,32,54,.18);display:grid;place-items:center;cursor:pointer;color:var(--navy);z-index:45;padding:0}
.rail-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4}
.rail-toggle:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.side.collapsed .rail-toggle svg{transform:rotate(180deg)}
.logo-mini{display:none;width:44px;height:44px;margin:20px auto 4px;border-radius:11px;background:rgba(255,255,255,.1);color:#fff;font-weight:800;font-size:22px;place-items:center}
.side.collapsed .logo-mini{display:grid}
.nav-txt{white-space:nowrap;overflow:hidden}
.nav a{position:relative}
.nav-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);min-width:18px;height:18px;background:var(--red);color:#fff;border-radius:9px;font-size:10.5px;font-weight:700;display:grid;place-items:center;padding:0 5px}
.side.collapsed .nav-badge{right:6px;top:7px;transform:none;min-width:15px;height:15px;font-size:9px;padding:0 3px}
.side.collapsed{width:76px;flex-basis:76px}
.side.collapsed .logo-wrap{display:none}
.side.collapsed .sec-label{font-size:0;padding:8px 0}
.side.collapsed .nav{padding:2px 12px}
.side.collapsed .nav a{justify-content:center;padding:11px 0;gap:0}
.side.collapsed .nav-txt{display:none}
.side.collapsed .side-user{justify-content:center}
.side.collapsed .side-user>div:last-child{display:none}
.sec-h .chev{margin-left:auto;font-size:20px;line-height:1;color:var(--muted);transition:transform .2s;flex:0 0 auto;user-select:none}
.sec.collapsed .sec-body{display:none}
.sec.collapsed .chev{transform:rotate(-90deg)}

/* ============ MOBILE RESPONSIVE — kompak & profesional di HP ============ */
.mob-menu{display:none;background:transparent;border:none;color:var(--ink);font-size:22px;line-height:1;padding:2px 6px;cursor:pointer;flex:0 0 auto}
#mobBackdrop{display:none}
@media (max-width:820px){
  /* Sidebar → DRAWER geser via hamburger; konten pakai LEBAR PENUH */
  .side{position:fixed;left:0;top:0;bottom:0;z-index:70;width:228px;flex-basis:228px;transform:translateX(-100%);transition:transform .24s ease;box-shadow:2px 0 22px rgba(0,0,0,.28);height:100vh}
  body.side-open .side{transform:translateX(0)}
  .side .logo-wrap{display:block;padding:16px 18px 8px}
  .side .logo-mini,.rail-toggle{display:none!important}
  .side .nav{padding:2px 12px}
  .side .nav a{justify-content:flex-start;padding:9px 13px;gap:11px}
  .side .nav-txt{display:inline;font-size:13.5px}
  .side .nav-badge{position:static;transform:none}
  .side .sec-label{font-size:10.5px;padding:9px 14px 3px}
  .side .side-user{justify-content:flex-start;padding:12px 16px}
  .side .side-user>div:last-child{display:block}
  .main{margin-left:0}
  #mobBackdrop{display:block;position:fixed;inset:0;background:rgba(10,22,40,.45);z-index:65;opacity:0;pointer-events:none;transition:opacity .24s}
  body.side-open #mobBackdrop{opacity:1;pointer-events:auto}
  .mob-menu{display:block}

  /* Topbar kompak */
  .top{gap:8px;padding:9px 11px;align-items:center}
  .hd-titles{flex:1;min-width:0}
  #pgTitle{font-size:15px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub{font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acts{gap:5px;flex:0 0 auto}
  .cp-label,.live-chip span:last-child{display:none}
  .copilot-btn{padding:7px 9px}.icon-btn{width:34px;height:34px}

  /* Konten lebih rapat & kecil */
  .wrap{padding:11px}
  .card{border-radius:12px;margin-bottom:12px}
  .card.pad{padding:12px 13px}
  .sec-body{padding:0 13px 14px}
  .sec-h{padding:12px 13px 8px}
  .panel-t{font-size:13px}
  .sec-h h2{font-size:14px}

  /* KPI CODEC — tetap 2 kolom, dikecilkan */
  .kd-grid{grid-template-columns:1fr 1fr;gap:8px}
  .kd-tile{padding:9px 10px;border-radius:10px}
  .kd-ic{font-size:16px}.kd-name{font-size:11.5px}.kd-param{font-size:9.5px}
  .kd-nums b{font-size:13px}.kd-nums small{font-size:9px}
  .kd-score{font-size:19px}.kchip{font-size:9.5px;padding:2px 7px}.kd-src{font-size:9px}

  /* Grid umum → tumpuk / kecil */
  .hl-grid{grid-template-columns:1fr}
  .hl-headrow{display:none}
  .funnel{grid-template-columns:1fr 1fr;gap:8px}
  .fstep .v{font-size:20px}
  .ga-svc-bar{grid-template-columns:1fr 1fr;gap:8px}
  .rating-card{flex-direction:column;gap:10px;padding:14px}
  .rc-score{font-size:30px}
  .two{grid-template-columns:1fr}
  .mini-panel{padding:10px 11px}
  .kpi .v{font-size:20px}
  [style*="grid-template-columns:repeat(5"]{grid-template-columns:1fr 1fr!important}
  [style*="grid-template-columns:repeat(4"]{grid-template-columns:1fr 1fr!important}
  [style*="grid-template-columns:repeat(3"]{grid-template-columns:1fr!important}

  /* Tabel/list panjang → scroll halus di dalam kartu, tak ada yang terpotong */
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .card table{min-width:520px}
  .sec-body{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .svc-head,.svc-row{min-width:540px}
  .nlog-head,.nlog-row{min-width:540px}
  .cp-headrow{display:none}
  .cp-row{grid-template-columns:1fr 1fr;gap:6px}
  .inv-steps{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
  .drawer{width:100%}
  .rb-plan-wrap{overflow-x:auto}
  #dbPill{font-size:9.5px;right:7px;bottom:7px;padding:4px 8px}
}
@media (max-width:430px){
  .funnel{grid-template-columns:1fr 1fr}
  .ga-svc-bar{grid-template-columns:1fr}
  #pgTitle{font-size:14px}
  .kd-param{font-size:9px}
  [style*="grid-template-columns:repeat(4"]{grid-template-columns:1fr 1fr!important}
  [style*="grid-template-columns:repeat(5"]{grid-template-columns:1fr 1fr!important}
}
</style>

async function fetchSOSummary(){

  try{
    const u=`${SP_CONFIG.site}/_api/web/lists/getbytitle('${SP_CONFIG.list}')/items?$select=Title,Status,TglCreate,AgingZone&$top=2000`;

function smoothPath(pts){
 if(pts.length<2) return pts.length?`M ${pts[0][0]},${pts[0][1]}`:'';
 let d=`M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
 for(let i=0;i<pts.length-1;i++){
   const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
   const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
   const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
   d+=` C ${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
 }
 return d;
}
function lineChart(){
 const W=820,H=300,padL=26,padR=18,padT=26,padB=54, n=TICKET_CAT.length;
 const maxV=Math.max(...TICKET_CAT.flatMap(c=>[c.mei,c.jun]))+5;
 const x=i=>padL+i*((W-padL-padR)/(n-1));
 const y=v=>padT+(H-padT-padB)*(1-v/maxV);
 const baseY=padT+(H-padT-padB);
 const series=[{k:'mei',col:'#a9b6ff',grad:'gMei',name:'May'},{k:'jun',col:'#2563eb',grad:'gJun',name:'June'}];
 const grid=[0,.33,.66,1].map(f=>{const yy=(padT+(H-padT-padB)*f).toFixed(1);return `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#eef1f6"/>`;}).join("");
 const defs=`<defs><linearGradient id="gJun" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.20"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></linearGradient><linearGradient id="gMei" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a9b6ff" stop-opacity="0.16"/><stop offset="100%" stop-color="#a9b6ff" stop-opacity="0"/></linearGradient></defs>`;
 const draw=series.map(s=>{
   const pts=TICKET_CAT.map((c,i)=>[x(i),y(c[s.k])]);
   const line=smoothPath(pts);
   const area=`${line} L ${pts[n-1][0].toFixed(1)},${baseY.toFixed(1)} L ${pts[0][0].toFixed(1)},${baseY.toFixed(1)} Z`;
   const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="#fff" stroke="${s.col}" stroke-width="2.5"/>`).join("");
   return `<path d="${area}" fill="url(#${s.grad})"/><path d="${line}" fill="none" stroke="${s.col}" stroke-width="3" stroke-linecap="round"/>${dots}`;
 }).join("");
 const xl=TICKET_CAT.map((c,i)=>`<text x="${x(i).toFixed(1)}" y="${H-padB+20}" text-anchor="middle" font-size="11" fill="#6b7a90">${c.short}</text>`).join("");
 const leg=series.map((s,i)=>`<g transform="translate(${padL+i*82},${H-12})"><rect width="11" height="11" rx="3" fill="${s.col}"/><text x="16" y="10" font-size="11.5" fill="#23344a">${s.name}</text></g>`).join("");
 return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${defs}${grid}${draw}${xl}${leg}</svg>`;
}

/* ===================== CODEC — KPI GA Dept (alignment anchor) =====================
   CODEC = Collaborative Deck General Affair — SINGLE SOURCE OF TRUTH.
   SEMUA KPI di bawah DIHITUNG LIVE dari data modul AGAVA (bukan angka statis):
   Service (TICKETS), Procurement (SO), Payment Tracker, Vendor Mgmt, Energy/ERSUS,
   HSE (IZIN), Transportation. Data berubah di modul → KPI CODEC ikut berubah. */
function kpiDeptData(){
 const K=[];
 // 1. SLA Response Tiket — dari modul Service (TICKETS.resp)
 const resp=TICKETS.map(t=>parseInt(t.resp)).filter(n=>!isNaN(n));
 const slaOk=resp.filter(n=>n<=15).length, slaPct=resp.length?Math.round(slaOk/resp.length*100):100;
 K.push({ic:"🎫",name:"SLA Response Tiket",param:resp.length+" tiket direspons · target ≤ 15 mnt",target:"≥ 95%",ach:slaPct+"%",pct:slaPct,st:slaPct>=95?"ok":slaPct>=85?"warn":"bad",src:"Service"});
 // 2. Rating Layanan GA — dari rating tiket closed (gaServiceRating)
 const r=gaServiceRating(), rv=parseFloat(r.score);
 K.push({ic:"⭐",name:"Rating Layanan GA",param:r.count+" responden · tiket selesai",target:"≥ 4.0",ach:r.score,pct:Math.round(rv/5*100),st:rv>=4?"ok":rv>=3.5?"warn":"bad",src:"Service"});
 // 3. Efisiensi Energi — dari data ERSUS (GRK 2026 vs baseline 2019)
 const avg19=GRK_2019.reduce((a,b)=>a+b,0)/GRK_2019.length, avg26=GRK_2026.reduce((a,b)=>a+b,0)/GRK_2026.length;
 const red=Math.round((1-avg26/avg19)*1000)/10;
 K.push({ic:"⚡",name:"Efisiensi Energi",param:"Emisi vs baseline 2019 · "+ENERGY_MONTHS.length+" bln",target:"−10%",ach:"−"+red+"%",pct:Math.min(100,Math.round(red/10*100)),st:red>=10?"ok":red>=7?"warn":"bad",src:"Energy · ERSUS"});
 // 4. SO On-Track — dari modul Procurement (SO.aging)
 const soOk=SO.filter(s=>s.aging==="On Track").length, soPct=SO.length?Math.round(soOk/SO.length*100):100;
 K.push({ic:"🛒",name:"SO On-Track",param:soOk+" dari "+SO.length+" SO berjalan",target:"≥ 90%",ach:soPct+"%",pct:soPct,st:soPct>=90?"ok":soPct>=75?"warn":"bad",src:"Procurement"});
 // 5. Payment On-Time — dari Payment Tracker (release vs estimasi)
 const rel=SO.filter(s=>s.invReleased), relOk=rel.filter(s=>!invRelEst(s)||(s.invReleaseDate&&s.invReleaseDate<=invRelEst(s))).length;
 const late=SO.filter(s=>invReleaseOverdue(s)).length, den=rel.length+late;
 const payPct=den?Math.round(relOk/den*100):100;
 K.push({ic:"💰",name:"Payment On-Time",param:rel.length+" released · "+late+" lewat estimasi",target:"≥ 95%",ach:payPct+"%",pct:payPct,st:payPct>=95?"ok":payPct>=80?"warn":"bad",src:"Payment Tracker"});
 // 6. Vendor SLA — dari Vendor Management (skor SLA kontrak, skala 3)
 const sl=VENDOR_CONTRACTS.filter(c=>c.sla!=null), slAvg=sl.length?sl.reduce((a,c)=>a+c.sla,0)/sl.length:0;
 K.push({ic:"🏢",name:"Vendor SLA",param:sl.length?(sl.length+" vendor ternilai dari "+VENDOR_CONTRACTS.length):("0 dari "+VENDOR_CONTRACTS.length+" vendor — isi SLA Form"),target:"≥ 2.50",ach:sl.length?slAvg.toFixed(2):"belum dinilai",pct:sl.length?Math.round(slAvg/3*100):0,st:!sl.length?"warn":slAvg>=2.5?"ok":slAvg>=2.2?"warn":"bad",src:"Vendor Mgmt"});
 // 7. Compliance Perizinan — dari HSE (IZIN yang belum jatuh tempo)
 const izOk=IZIN.filter(z=>z.due>=TODAY_STR).length, izPct=IZIN.length?Math.round(izOk/IZIN.length*100):100;
 K.push({ic:"📄",name:"Compliance Perizinan",param:izOk+" dari "+IZIN.length+" izin masih aktif",target:"100%",ach:izPct+"%",pct:izPct,st:izPct>=100?"ok":izPct>=90?"warn":"bad",src:"HSE & Sustain"});
 // 8. Transport Terlayani — dari modul Transportation
 const trH=TRANSPORT_REQ.filter(x=>(x.status||"Diajukan")!=="Diajukan").length, trPct=TRANSPORT_REQ.length?Math.round(trH/TRANSPORT_REQ.length*100):100;
 K.push({ic:"🚗",name:"Transport Terlayani",param:trH+" dari "+TRANSPORT_REQ.length+" permintaan ditindaklanjuti",target:"≥ 90%",ach:trPct+"%",pct:trPct,st:trPct>=90?"ok":trPct>=70?"warn":"bad",src:"Transportation"});
 return K;
}

function openDrawer(no){

function dualLineChart(a,b,color,key){
 const W=520,H=140,padL=8,padR=8,padT=16,padB=20,n=a.length;

 const x=i=>padL+i*((W-padL-padR)/(n-1)),y=v=>padT+(H-padT-padB)*(1-(v-minV)/((maxV-minV)||1)),baseY=H-padB;
 const ap=a.map((v,i)=>[x(i),y(v)]),aline=smoothPath(ap),area=`${aline} L ${ap[n-1][0].toFixed(1)},${baseY.toFixed(1)} L ${ap[0][0].toFixed(1)},${baseY.toFixed(1)} Z`;
 const bp=b.map((v,i)=>[x(i),y(v)]),bline=smoothPath(bp),gid="dl"+key;

 return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">

  <path d="${area}" fill="url(#${gid})"/><path d="${aline}" fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round"/>${ap.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#fff" stroke="${color}" stroke-width="2"/>`).join("")}${xl}</svg>`;
}

async function submitTicket(){

 // Payload key = schema yang harus didaftarkan di trigger "When an HTTP request is received".

 if(res.ok===false){ alert("⚠️ Flow 'Create Ticket' gagal dipanggil ("+(res.error||('HTTP '+(res.httpStatus||'?')))+").\nTiket tetap dibuat lokal di AGAVA.\nCek URL/CORS flow di Vendor Management → Power Automate Bridge."); }
 const no=res.ticketNo||("GA-202606-"+String(++ticketSeq).padStart(4,"0"));
 TICKETS.unshift({no,judul:title,team:"BM",cat:cat,lokasi:loc,created:TODAY_STR,status:res.status||"Submitted",stg:res.stg||0,resp:"—",pic:res.pic||"",esc:false,requester:req,ts:{0:nowStamp()}});

 if(res.ticketNo && !res._sim){ alert("✅ Tiket dibuat & flow Power Automate dijalankan.\nNomor dari flow: "+no+"\nStatus: "+(res.status||"Submitted")); }
}

function rbSlotClick(t){

 if(!s.selStart || s.selEnd){ s.selStart=t; s.selEnd=null; }

 else { s.selStart=t; s.selEnd=null; }

/* ===================== ROOM BOOKING — ERSUS idle auto-release =====================
   Jika ERSUS mendeteksi ruang idle 30 mnt → notif "jadi digունakan?". Ya → +15 mnt
   (maks 2x perpanjangan). Jika tetap idle setelah 2x → release (total 1 jam). */
function rbAllRoom(id){ for(const k in RB_ROOMS){ const r=RB_ROOMS[k].find(x=>x.id===id); if(r)return r; } return {name:id}; }
function rbReleaseBooking(roomId){ const b=rbBookingAt(roomId,TODAY_STR,RB_NOW); if(!b)return; const i=RB_BOOKINGS.indexOf(b); if(i>=0)RB_BOOKINGS.splice(i,1); }
function rbIdleCheck(roomId){
 rbCancelHide(); const p=document.getElementById("rbpop"); if(p)p.classList.add("hide");
 const room=rbAllRoom(roomId), b=rbBookingAt(roomId,TODAY_STR,RB_NOW);
 if(!b){ alert("Ruang "+room.name+" tidak sedang dipakai (tak ada booking di jam "+RB_NOW+")."); return; }
 if((b.ext||0)>=2){ rbReleaseBooking(roomId); renderRoomBook(); alert("📢 ERSUS → "+room.name+"\nBookingan Anda sudah di-release karena 1 jam tidak digunakan. Terima kasih."); return; }
 document.getElementById("drawer").innerHTML=`
  <div class="dh"><button class="x" onclick="closeDrawer()">✕</button><div style="font-weight:700;color:var(--ink);font-size:16px">🛰️ ERSUS — Ruang Idle</div><div class="muted small" style="margin-top:4px">Deteksi okupansi otomatis</div></div>
  <div class="db">
    <div class="card pad" style="background:#fff8f0;border-left:4px solid var(--amber);font-size:13px;line-height:1.6">Anda memesan ruang <b>${room.name}</b> di jam <b>${b.start}</b>.<br>Sudah <b>30 menit tidak ditempati</b> — bookingan Anda akan di-release jika tidak ada konfirmasi penggunaan.</div>
    <div class="muted small" style="margin-top:10px">Perpanjangan terpakai: <b>${b.ext||0}/2</b>${(b.ext||0)===1?' · ini perpanjangan terakhir':''}</div>
    <div style="font-weight:700;color:var(--ink);margin-top:16px;font-size:14px">Jadi digunakan?</div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn-act" style="flex:1" onclick="rbIdleYes('${roomId}')">✅ Ya, digunakan</button>
      <button class="btn-out" style="flex:1" onclick="rbIdleNo('${roomId}')">Tidak</button>
    </div>
  </div>`;
 document.getElementById("ovl").classList.add("show");
}
function rbIdleYes(roomId){
 const b=rbBookingAt(roomId,TODAY_STR,RB_NOW), room=rbAllRoom(roomId); if(!b){ closeDrawer(); return; }
 b.ext=(b.ext||0)+1; b.end=rbAddMin(b.end,15);
 closeDrawer(); renderRoomBook();
 alert("✅ Booking "+room.name+" diperpanjang 15 menit (s/d "+b.end+").\nPerpanjangan ke-"+b.ext+"/2."+(b.ext>=2?"\n⚠️ Jika masih idle, ruang akan otomatis di-release.":""));
}
function rbIdleNo(roomId){
 const room=rbAllRoom(roomId); rbReleaseBooking(roomId); closeDrawer(); renderRoomBook();
 alert("📢 Bookingan Anda di-release. Ruang "+room.name+" kembali tersedia. Terima kasih.");
}

/* ============ APPROVALS PAGE (tier-aware) ============ */
const TIERS=["Budget","Procurement","Section Head","Dept Head","Division Head","Chief CHCD"];
let gTier="Section Head";
let APPROVALS=[];
/* Gate sadar-eskalasi.
   Normal (budget ada):   Budget → Procurement → Dept Head → selesai.
   Eskalasi (budget tdk): Budget(Escalated) → Dept Head → Procurement → selesai. */
function soGateTier(s){
 if(s.apprDept==="Rejected")return null;
 if(s.apprBudget!=="Approved"&&s.apprBudget!=="Escalated")return"Budget";
 if(s.escalated){
   if(s.apprDept!=="Approved")return"Dept Head";
   if(s.apprProc!=="Approved")return"Procurement";
   return null;
 } else {
   if(s.apprProc!=="Approved")return"Procurement";
   if(s.apprDept!=="Approved")return"Dept Head";
   return null;
 }
}
/* SO yang dieskalasi & masih di Dept Head juga muncul di Inbox PIC Procurement (read-only "waiting"). */
function soApprovalsForTier(t){ return SO.filter(s=>{ const g=soGateTier(s); if(!g)return false; if(g===t)return true; if(t==="Procurement"&&s.escalated&&g==="Dept Head")return true; return false; }); }
function soPendingAll(){ return SO.filter(s=>soGateTier(s)).map(s=>({approval:true,tier:soGateTier(s),item:s.no+" — "+s.item,source:"SO",status:soGateTier(s)})); }
function approvalsForTier(){ return soApprovalsForTier(gTier).length + APPROVALS.filter(a=>a.tier===gTier && a.status==="Pending").length; }
function pendingApprovals(){ return APPROVALS.filter(a=>a.status==="Pending").concat(soPendingAll()); }
function activeNotifs(){ return NOTIFS.filter(n=>!n.done); }
function navBadge(id){ let c=0; if(id==="approvals")c=approvalsForTier(); else if(id==="reminder")c=(isEndUser()?(myBookingCount()+(isPicTransport()?transportPending():0)):(activeNotifs().length+pendingApprovals().length+(payRemRole()?paymentReminders().length:0)))+myClarifyCount(); return c>0?`<span class="nav-badge">${c}</span>`:""; }
function approveSO(no,gate,decision){
 var s=SO.find(x=>x.no===no); if(!s)return;
 s.ts=s.ts||{};
 if(gate==="budget"){
   if(decision==="Escalate"){ s.apprBudget="Escalated"; s.escalated=true; s.ts.budget=nowStamp(); alert("⏫ SO "+no+" diekskalasi ke GA Dept Head (budget tidak ada).\nJuga tampil di Inbox PIC Procurement — status Waiting Approval Dept Head."); }
   else { s.apprBudget="Approved"; s.escalated=false; s.ts.budget=nowStamp(); alert("✅ Budget di-approve. SO "+no+" diteruskan ke PIC Procurement."); }
 } else if(gate==="proc"){
   var sel=document.getElementById("assign-"+no); var staff=sel?sel.value:(s.staffPIC||"");
   if(!staff){ alert("Pilih Staff Procurement dulu sebelum Approve."); return; }
   s.apprProc="Approved"; s.staffPIC=staff; s.pic=staff; s.ts.proc=nowStamp();
   alert(s.escalated ? ("✅ PIC Procurement approve. SO "+no+" langsung masuk Assigned SO "+staff+" (sudah di-approve Dept Head).")
                     : ("✅ PIC Procurement approve. SO "+no+" diteruskan ke GA Dept Head. Assigned: "+staff+"."));
 } else if(gate==="dept"){
   if(decision==="Rejected"){ s.apprDept="Rejected"; s.ts.dept=nowStamp(); alert("⛔ SO "+no+" ditolak GA Dept Head."); }
   else { s.apprDept="Approved"; s.ts.dept=nowStamp(); alert(s.escalated ? ("✅ GA Dept Head approve. SO "+no+" → tombol aksi PIC Procurement kini aktif.")
                     : ("✅ GA Dept Head approve. SO "+no+" final approved → masuk Assigned SO "+(s.staffPIC||"")+".")); }
 }
 renderApprovals(); renderProc(); renderAssigned(); renderReminder(); buildNav(); updateBell();
}

/* Reusable timestamped stepper — steps before doneCount are ✓ with their
   timestamp (set when the button was clicked); the doneCount-th is current. */
function tsStepper(labels,doneCount,tsArr){
 return '<div class="inv-steps">'+labels.map((lb,i)=>{
   const done=i<doneCount, cur=i===doneCount, cls=done?'done':cur?'cur':'wait';
   const ts=(tsArr&&tsArr[i]!=null&&tsArr[i]!=='')?('🕐 '+tsArr[i]):(cur?'in progress':'');
   return `<div class="inv-step ${cls}"><div class="inv-dot">${done?'✓':(i+1)}</div><div class="inv-lbl">${lb}</div><div class="inv-ts">${ts}</div></div>`;
 }).join('<div class="inv-bar"></div>')+'</div>';
}

/* ============ PAYMENT TRACKER PAGE ============ */
/* Approval sebenarnya berjalan di SAP (tak diakses AGAVA). AGAVA hanya melacak
   4 status + hitung aging (hari kerja) vs SLA per klasifikasi nominal + reminder. */
function payWaitDays(s){ return Math.floor((new Date(TODAY_STR)-new Date(s.bastDate||TODAY_STR))/86400000); }
const PIPE=["Invoice Diterima","Invoice di Proses","Invoice Proses BPH","Pembayaran Release"];
/* Klasifikasi nominal (Rp juta) → tier approval (di SAP) + SLA hari kerja. */
function invClass(n){ n=+n||0; if(n<=10) return {tier:"Dept Head", sla:5}; if(n<=100) return {tier:"Division Head", sla:7}; if(n<=300) return {tier:"Chief CHCD", sla:15}; return {tier:"Director In Charge", sla:21}; }
function workdays(from,to){ let d=new Date(from+"T00:00:00"), end=new Date(to+"T00:00:00"), n=0; if(isNaN(d)||isNaN(end)||end<=d)return 0; while(d<end){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6)n++; } return n; }
function invNom(s){ return s.invNominal||s.nilai||0; }
function invWaitHK(s){ return workdays(s.bastDate||TODAY_STR, TODAY_STR); }
function invBphEst(s){ return s.invProcDate? addWorkdays(s.invProcDate, invClass(invNom(s)).sla) : null; }
function invRelEst(s){ return invBphEst(s); }   /* est release = mulai di-Proses + HK approval per nominal (tanpa treasury tambahan) */
function invReleaseOverdue(s){ return s.invProcessed && !s.invReleased && TODAY_STR > invRelEst(s); }
function addWorkdays(dateStr,n){ let d=new Date((dateStr||TODAY_STR)+"T00:00:00"); if(isNaN(d))return dateStr; let a=0; while(a<n){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6)a++; } return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
/* payState: status pipeline. Estimasi rilis = (Invoice di Proses + HK approval per nominal) + HK treasury. */
function payState(s){
 if(s.invReleased) return {state:'released'};
 if(!s.invReceived) return {state:'waiting'};
 if(!s.invProcessed) return {state:'process'};
 const est=invRelEst(s);
 if(TODAY_STR>est) return {state:'overdue', est};
 if(workdays(TODAY_STR,est)<=1) return {state:'warn', est};
 return {state:'ontrack', est};
}
/* Reminder ke Staff Budget: (a) Menunggu Invoice ≥5 HK, (b) Release lewat estimasi → f-up treasury. */
function paymentReminders(){
 const wait=SO.filter(s=>s.wstep>=4 && !s.invReceived && invWaitHK(s)>=5).map(s=>({s,kind:'wait'}));
 const rel=SO.filter(s=>invReleaseOverdue(s)).map(s=>({s,kind:'release'}));
 return wait.concat(rel);
}
function payRemRole(){ return ['admin','budget','finance','section'].includes(gRole); }   // notif ditujukan ke PIC/staff Budget
function payCanAct(){ return gRole==="finance"||gRole==="admin"; }   // Staff Budget (Salsa) + Administrator; non-admin lain view/monitor
function invReceive(no){ const s=SO.find(x=>x.no===no); if(!s)return; s.invReceived=true; s.invNominal=invNom(s); s.invRecvDate=TODAY_STR; s.invStep=0; if(typeof closeDrawer==="function")closeDrawer(); renderPayment(); if(typeof renderProc==="function")renderProc(); renderReminder(); updateBell();
 alert("✅ Invoice DITERIMA dicatat ("+TODAY_STR+").\nMasuk Invoice Payment Pipeline — kelompok nominal: "+invClass(invNom(s)).tier+"."); }
function invProcess(no){ const s=SO.find(x=>x.no===no); if(!s||!s.invReceived||s.invProcessed)return; s.invProcessed=true; s.invProcDate=TODAY_STR; s.invStep=1; renderPayment(); renderReminder(); updateBell();
 alert("✅ Invoice DI PROSES — BPH dibuat di SAP ("+TODAY_STR+").\nEst Pembayaran Release: "+fmtDay(invRelEst(s))+" (+"+invClass(invNom(s)).sla+" HK, s/d "+invClass(invNom(s)).tier+")"); }
function invConfirmRelease(no){ const s=SO.find(x=>x.no===no); if(!s||!s.invProcessed||s.invReleased)return; s.invReleased=true; s.invReleaseDate=TODAY_STR; s.invStep=3; renderPayment(); renderReminder(); updateBell();
 alert("🏁 Pembayaran RELEASE dikonfirmasi ke vendor ("+TODAY_STR+")."); }
function invUndo(no){ const s=SO.find(x=>x.no===no); if(!s)return; if(s.invReleased){s.invReleased=false;delete s.invReleaseDate;s.invStep=1;} else if(s.invProcessed){s.invProcessed=false;delete s.invProcDate;s.invStep=0;} else if(s.invReceived){s.invReceived=false;delete s.invRecvDate;delete s.invStep;} renderPayment(); renderReminder(); updateBell(); }
function invStepper(s){
 const recv=s.invRecvDate, proc=s.invProcDate, bph=invBphEst(s), rel=invRelEst(s), over=invReleaseOverdue(s);
 const def=[
   {done:!!recv, cur:false, late:false, sub: recv?fmtDay(recv):''},
   {done:!!proc, cur:(s.invReceived&&!proc), late:false, sub: proc?fmtDay(proc):(s.invReceived?'klik bila BPH dibuat':'')},
   {done:!!s.invReleased, cur:(proc&&!s.invReleased), late:false, sub: (proc&&!s.invReleased)?'BPH diproses':''},
   {done:!!s.invReleased, cur:(proc&&!s.invReleased&&!over), late:over, sub: s.invReleased?fmtDay(s.invReleaseDate):(proc?((over?'⚠ lewat ':'est ')+fmtDay(rel)):'')}
 ];
 return '<div class="inv-steps">'+def.map((d,i)=>{
   const cls=d.late?'late':d.done?'done':d.cur?'cur':'wait';
   const dot=d.done?'✓':d.late?'!':(i+1);
   return `<div class="inv-step ${cls}"><div class="inv-dot">${dot}</div><div class="inv-lbl">${PIPE[i]}</div><div class="inv-ts ${d.late?'late':''}">${d.sub||''}</div></div>`;
 }).join('<div class="inv-bar"></div>')+'</div>';
}

   else if(!s.invReleased) act=`<button class="btn-act" style="padding:6px 13px;font-size:12px${st.state==='overdue'?';background:var(--red)':''}" onclick="invConfirmRelease('${s.no}')">✅ Konfirmasi Release</button>${st.state==='overdue'?' <span style="color:var(--red);font-weight:700;font-size:12px">lewat estimasi → f-up manual ke treasury</span>':''}`;
   else act=`<span class="muted small">✅ Pembayaran release ke vendor (${s.invReleaseDate}).</span>`;
   act+=` <button class="btn-out" style="padding:5px 9px;font-size:11px;margin-left:4px" onclick="invUndo('${s.no}')">↩</button>`;
 } else act=`<span class="muted small">Status: <b>${s.invReleased?'Pembayaran Release':PIPE[s.invStep||0]}</b></span>`;
 const estRight = s.invReleased?('release '+s.invReleaseDate)
   : s.invProcessed?('🎯 est release: <b style="color:'+(st.state==='overdue'?'var(--red)':'var(--ink)')+'">'+fmtDay(invRelEst(s))+'</b>')

 return `<div class="card pad" style="margin:12px 0 0;border:1px solid var(--line)${st.state==='overdue'?';border-left:4px solid var(--red)':''}">
   <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
     <div><b class="sono">${s.no}</b> · <span style="color:var(--ink);font-weight:600">${s.vendor||'Vendor'}</span>
       <div class="muted small" style="margin-top:3px">${s.spkNo||''} · <b>Rp ${invNom(s)} jt</b> · approval s/d <b>${cls.tier}</b> · ${cls.sla} HK · diterima ${s.invRecvDate||'—'}</div></div>
     <div style="text-align:right">${badge}<div class="muted small" style="margin-top:3px">${estRight}</div></div>
   </div>

   <div style="margin-top:12px">${act}</div>
 </div>`;

/* ===================== FLOW BRIDGE — AGAVA ⇄ Power Automate =====================
   Tickets & SO are created/updated IN-APP, then this bridge fires the matching
   Power Automate flow and applies the flow's response back to AGAVA.
   • Production (Power Apps): each name maps to a Flow.Run() call; the flow ends
     with "Respond to a PowerApp" → returns ticketNo/SO no/status (standard
     connectors, no premium).
   • This HTML app: paste each flow's HTTP POST URL in Vendor → Power Automate
     Bridge (saved to localStorage). URL set → real POST; empty → local sim.
     (HTTP-trigger flow = Premium connector.) */
const FLOW={
  endpoints:{ createTicket:"", updateTicket:"", createSO:"", advanceSO:"", sendSPK:"", sendBAST:"" },
  log:[]
};
function loadFlowConfig(){ try{ const s=localStorage.getItem('agava_flow_endpoints'); if(s){ const o=JSON.parse(s); Object.keys(FLOW.endpoints).forEach(k=>{ if(typeof o[k]==="string")FLOW.endpoints[k]=o[k]; }); } }catch(e){} }
function saveFlowConfig(){ try{ localStorage.setItem('agava_flow_endpoints', JSON.stringify(FLOW.endpoints)); }catch(e){} }
function setFlowEndpoint(name,url){ FLOW.endpoints[name]=(url||"").trim(); saveFlowConfig(); if(active==="vendor")renderVendor(); }
/* When an endpoint URL is set → POST to that Power Automate flow and use its
   JSON response. Empty URL → local simulation (so the app still works offline). */
async function triggerFlow(name,payload){
  const url=FLOW.endpoints[name];
  FLOW.log.unshift({t:nowStamp(),dir:"→",name,info:(url?'HTTP':'sim')+' · '+payloadBrief(payload)});
  if(FLOW.log.length>40)FLOW.log.pop();
  let res;
  if(url){
    try{
      const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const txt=await r.text();
      try{ res=txt?JSON.parse(txt):{ok:r.ok}; }catch(e){ res={ok:r.ok,raw:txt}; }
      if(!r.ok){ res.ok=false; res.httpStatus=r.status; }
    }catch(e){ console.warn("flow http error",name,e); res={ok:false,error:String(e.message||e)}; }
  } else { res=simulateFlow(name,payload); res._sim=true; }
  FLOW.log.unshift({t:nowStamp(),dir:"←",name,info:(res&&res.ok===false?'ERR ':'')+payloadBrief(res)});
  if(active==="vendor")renderVendor();
  return res||{};
}
async function testFlow(name){
  const url=FLOW.endpoints[name]; if(!url){ alert("Isi & simpan URL flow dulu untuk "+name+"."); return; }
  const sample = name==="createTicket"
    ? {title:"TEST — koneksi AGAVA", cat:"HSE & Sustainability", lokasi:"AMDI", requester:(gUser?gUser.name:"AGAVA"), created:TODAY_STR, _test:true}
    : {_test:true, flow:name};
  const res=await triggerFlow(name,sample);
  if(res&&res.ok===false){ alert("❌ Gagal terhubung ke flow "+name+"\n"+(res.error||('HTTP '+(res.httpStatus||'?')))+"\n\nCek: URL benar? Flow aktif? CORS mengizinkan origin ini?"); }
  else { alert("✅ Flow "+name+" merespons:\n"+JSON.stringify(res).slice(0,400)); }
}
function simulateFlow(name,payload){
  if(name==="createTicket") return { ticketNo:"GA-202606-"+String(++ticketSeq).padStart(4,"0"), status:"Submitted", stg:0 };
  if(name==="createSO")     return { no: soSeq(), status:"Submitted" };
  return { ok:true };
}
function payloadBrief(o){ try{ return Object.entries(o||{}).slice(0,3).map(([k,v])=>k+":"+(typeof v==="object"?"…":String(v).slice(0,18))).join(" · "); }catch(e){ return ""; } }
/* Flow → AGAVA callback. A flow (or its webhook response) can push a status
   change back into AGAVA. Exposed on window so an external script can call it. */
function applyFlowCallback(entity,key,patch){
  if(entity==="ticket"){ const t=TICKETS.find(x=>x.no===key); if(t){ Object.assign(t,patch); renderService(); renderOverview(); updateBell(); } }
  else if(entity==="so"){ const s=SO.find(x=>x.no===key); if(s){ Object.assign(s,patch); renderProc(); renderAssigned(); renderPayment(); updateBell(); } }
  return true;
}
window.agavaFlowCallback=applyFlowCallback;

/* ===================== LIVE DATA — local Excel auto-sync =====================
   Reads ONE local .xlsx workbook every 10s via the File System Access API
   (Chrome / Edge). Recognized sheets: "SO" and "Tickets". Column headers are
   matched case-insensitively with EN/ID aliases; missing fields fall back to
   defaults (normalizeSO). SheetJS is bundled locally so this works offline. */
const LIVE={ handle:null, timer:null, intervalMs:10000, connected:false, last:null, fileName:"" };

function liveToggle(){ if(LIVE.connected) disconnectLive(); else connectLive(); }

async function connectLive(){
  if(typeof XLSX==="undefined"){ liveStatus("err","SheetJS not loaded — pastikan file xlsx.full.min.js ada di folder yang sama"); alert("Library Excel (xlsx.full.min.js) tidak termuat. Pastikan file itu ada di folder yang sama dengan HTML ini."); return; }
  if(typeof window.showOpenFilePicker!=="function"){ liveStatus("err","Browser tak mendukung"); alert("Live Data butuh Chrome atau Edge (File System Access API). Buka file ini di Chrome/Edge."); return; }
  try{
    const [h]=await window.showOpenFilePicker({ multiple:false,
      types:[{description:"Excel Workbook", accept:{"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet":[".xlsx",".xlsm"]}}] });
    LIVE.handle=h; LIVE.fileName=h.name; LIVE.connected=true;
    await syncLive();                                  // first read immediately
    if(LIVE.timer) clearInterval(LIVE.timer);
    LIVE.timer=setInterval(syncLive, LIVE.intervalMs); // then every 10s
  }catch(e){ if(e&&e.name!=="AbortError"){ liveStatus("err",e.message); console.warn("connectLive:",e); } }
}

function disconnectLive(){
  if(LIVE.timer) clearInterval(LIVE.timer);
  LIVE.timer=null; LIVE.connected=false; LIVE.handle=null; LIVE.last=null;
  liveStatus("off","");
}

async function syncLive(){
  if(!LIVE.handle) return;
  try{
    const file=await LIVE.handle.getFile();
    const buf =await file.arrayBuffer();
    const wb  =XLSX.read(buf,{type:"array",cellDates:true});
    let changed=false;
    /* Excel feeds READ-ONLY reference data only. SO & Tickets are created/updated
       IN-APP (then pushed to Power Automate), so they are NOT synced from Excel. */
    if(wb.SheetNames.includes("Rooms"))  { applyLiveRooms(XLSX.utils.sheet_to_json(wb.Sheets["Rooms"],{defval:""}));  changed=true; }
    if(changed){ renderAll(); }
    LIVE.last=new Date(); liveStatus("on",LIVE.fileName);
  }catch(e){
    /* file may be mid-save (locked by Excel) — keep last good data, retry next tick */
    console.warn("live sync skipped:",e.message); liveStatus("warn",LIVE.fileName);
  }
}

/* ---- column mapping helpers (case-insensitive, EN/ID aliases) ---- */
function liveCell(row,keys){ for(const k of keys){ for(const rk in row){ if(String(rk).toLowerCase().trim()===k) return row[rk]; } } return ""; }
function liveNum(v){ const n=parseFloat(String(v).replace(/[^\d.\-]/g,"")); return isNaN(n)?0:n; }
function liveDate(v){ if(!v)return""; if(v instanceof Date&&!isNaN(v))return v.toISOString().slice(0,10); return String(v).trim(); }

function applyLiveSO(rows){
  const mapped=rows.map(r=>{
    const o={
      no:    String(liveCell(r,["noso","no","nomor so","nomorso","so"])||"").trim(),
      item:  String(liveCell(r,["item","deskripsi","description","uraian"])||"").trim(),
      req:   String(liveCell(r,["requester","req","pemohon"])||"").trim(),
      pic:   String(liveCell(r,["pic","staff pic","staff"])||"").trim(),
      nilai: liveNum(liveCell(r,["nilai","estimasinilai","estimasi","value","amount"])),
      jenis: String(liveCell(r,["jenis","jenispengadaan","type"])||"Goods").trim(),
      stage: liveNum(liveCell(r,["stage","stageno","stg"])),
      aging: String(liveCell(r,["aging","agingzone","zona"])||"On Track").trim(),
      vendor:String(liveCell(r,["vendor","supplier"])||"").trim()
    };
    const ab=liveCell(r,["apprbudget","approval_budget","budget"]);   if(ab)String(ab).trim()&&(o.apprBudget=String(ab).trim());
    const ap=liveCell(r,["apprproc","approval_proc","procurement"]);  if(ap)String(ap).trim()&&(o.apprProc=String(ap).trim());
    const ad=liveCell(r,["apprdept","approval_depthead","depthead","dept head"]); if(ad)String(ad).trim()&&(o.apprDept=String(ad).trim());
    const ws=liveCell(r,["wstep","workstep"]); if(ws!=="")o.wstep=liveNum(ws);
    const sp=liveCell(r,["staffpic","staff_pic"]); if(sp)o.staffPIC=String(sp).trim();
    return o;
  }).filter(o=>o.no);
  if(!mapped.length) return;
  SO.length=0; mapped.forEach(s=>SO.push(s));
  normalizeSO();
}

function applyLiveRooms(rows){
  const mapped=rows.map(r=>({
    room:  String(liveCell(r,["room","ruangan","ruang"])||"").trim(),
    event: String(liveCell(r,["event","acara","agenda","judul","kegiatan"])||"").trim(),
    date:  liveDate(liveCell(r,["date","tanggal","tgl"])),
    start: String(liveCell(r,["start","mulai","starttime","jam mulai","jammulai"])||"").trim(),
    end:   String(liveCell(r,["end","selesai","endtime","jam selesai","jamselesai"])||"").trim(),
    pax:   liveNum(liveCell(r,["pax","peserta","kapasitas","jumlah"])),
    status:String(liveCell(r,["status"])||"Booked").trim()
  })).filter(b=>b.room && b.date);
  if(!mapped.length) return;
  ROOM_BOOKINGS.length=0; mapped.forEach(b=>ROOM_BOOKINGS.push(b));
}

function liveStatus(state,name){
  const chip=document.getElementById("liveChip"),dot=document.getElementById("liveDot"),txt=document.getElementById("liveTxt");
  if(!chip) return;
  const hh=v=>('0'+v).slice(-2);
  const tstr=LIVE.last?(hh(LIVE.last.getHours())+":"+hh(LIVE.last.getMinutes())+":"+hh(LIVE.last.getSeconds())):"";
  if(state==="off"){ chip.className="live-chip"; txt.textContent="Connect Excel"; chip.title="Click to connect a local Excel workbook (auto-refresh every 10s)"; return; }
  if(state==="on"){ chip.className="live-chip on"; txt.textContent="Live · "+tstr; chip.title=name+" · auto-refresh 10s · click to stop"; }
  else if(state==="warn"){ chip.className="live-chip warn"; txt.textContent="Live · retry…"; chip.title="File busy (Excel saving) — will retry next tick"; }
  else if(state==="err"){ chip.className="live-chip err"; txt.textContent="Live error"; chip.title=name||"Live Data error"; }
}

const AGDB={on:false,db:null,pill:null};
function dbPill(txt,ok){
 if(!AGDB.pill){ AGDB.pill=document.createElement("div"); AGDB.pill.id="dbPill";
   AGDB.pill.style.cssText="position:fixed;right:14px;bottom:12px;z-index:80;background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:11.5px;font-weight:600;color:var(--muted);box-shadow:0 2px 10px rgba(15,40,80,.08);font-family:var(--ff)";
   document.body.appendChild(AGDB.pill); }
 AGDB.pill.innerHTML=(ok?'<span style="color:#15a34a">●</span> ':'<span style="color:#9aa7b8">●</span> ')+txt;
}
function dbInit(){
 try{
  if(typeof firebase==="undefined"||!firebase.initializeApp){ dbPill("Database: offline — mode lokal",false); return; }
  firebase.initializeApp({apiKey:"AIzaSyCS8QGySkAcjd-49CdjElhgeMJqBtBcY48",authDomain:"agava-astra.firebaseapp.com",projectId:"agava-astra",storageBucket:"agava-astra.firebasestorage.app",messagingSenderId:"157492176112",appId:"1:157492176112:web:00f66a9aa9d4e7df650e35"});
  AGDB.db=firebase.firestore();
  dbPill("Database: menghubungkan…",false);
  AGDB.db.collection("agava_tickets").orderBy("created","desc").limit(300).onSnapshot(snap=>{
    AGDB.on=true; dbPill("Database: Firebase live · "+snap.size+" tiket",true);
    let changed=false;
    snap.docChanges().forEach(ch=>{
      const d=ch.doc.data(); d.no=d.no||ch.doc.id;
      const i=TICKETS.findIndex(t=>t.no===d.no);
      if(ch.type==="removed"){ if(i>=0){TICKETS.splice(i,1);changed=true;} }
      else if(i>=0){ Object.assign(TICKETS[i],d); changed=true; }
      else { TICKETS.unshift(d); changed=true; }
    });
    if(changed){ renderService(); renderOverview(); updateBell(); }
  },err=>{ AGDB.on=false; dbPill("Database: rules tertutup — mode lokal",false); console.warn("AGDB rules/err:",err&&err.code); });
 }catch(e){ dbPill("Database: offline — mode lokal",false); console.warn("AGDB init:",e); }
}
function dbSaveTicket(t){ if(!AGDB.on||!AGDB.db||!t||!t.no)return; try{ AGDB.db.collection("agava_tickets").doc(String(t.no)).set(JSON.parse(JSON.stringify(t)),{merge:true}); }catch(e){ console.warn("AGDB save:",e); } }
